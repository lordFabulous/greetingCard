<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="birthday-title">Happy Birthday!</h1>

    <div id="scene-container">
        <div id="trigger-container">
            <img id="trigger-image" src="./images/envelope-svgrepo-com.svg" alt="Click to open!">
        </div>
        <div id="instruction-arrow">Open it! ↗</div>
        <div id="cake-container" class="hidden">
            <img src="./images/cake-svgrepo-com.svg" alt="Delicious Cake">
            <div class="message">Wish you all the best!</div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
