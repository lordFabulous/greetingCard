<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="birthday-title">Happy Birthday!</h1>
    <div id="scene-container">
        <div id="trigger-container">
            <img id="trigger-image" src="./images/envelope-svgrepo-com.svg" alt="Click to open!">
        </div>

        <div id="instruction-arrow">Open it! ↗</div>

        <div id="cake-container" class="hidden">
            <img src="./images/cake-svgrepo-com.svg" alt="Delicious Cake">
            <div class="message">Wish you all the best!</div>
        </div>

        <div id="present-for-miki" class="hidden">
        <div class="message">I hope your special day is as wonderful as you are. <br> I love you so much and can't wait to share these gifts with you! <br> Yours, Tiki ❤️</div>

            <!-- NEW: Wrapper to hold the cards side-by-side -->
            <div class="image-row">
                <!-- Clickable 'The Lives of Others' Preview -->
                <a href="https://www.londontheatredirect.com/play/the-lives-of-others-tickets?gclsrc=aw.ds&gad_source=1&gad_campaignid=23926529452&gbraid=0AAAAAD_hqzS6ADOVSnbqBhSa0YQvDjaHV&gclid=CjwKCAjwgajSBhBEEiwASicJUxwv27beIwYF0CT8KUrleDbCRpmNGA4Z0o-EFTWYy0GJhHW_vZYIGhoCWyUQAvD_BwE"
                    target="_blank" rel="noopener noreferrer" class="ticket-link-card">
                    <img src="https://images.ctfassets.net/6pezt69ih962/6NNOsESAKyZrMeaHudje7g/02a0a5272755faa2b34a190a70309365/480_x_720.png"
                        alt="The Lives of Others Tickets">
                    <div class="ticket-label">🎭 The Lives of Others</div>
                </a>

                <!-- Clickable Daniel Sloss Preview -->
                <a href="https://www.ticketmaster.co.uk/daniel-sloss-tickets/artist/1496632" target="_blank"
                    rel="noopener noreferrer" class="ticket-link-card">
                    <img src="https://s1.ticketm.net/dam/a/cfa/e476394e-b2ce-4a11-8230-879e15686cfa_RETINA_PORTRAIT_3_2.jpg"
                        alt="Daniel Sloss Tickets">
                    <div class="ticket-label">🎟️ Daniel Sloss</div>
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
